<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans KR', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <!-- 제목 -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">계산기</h1>
            <p class="text-slate-400">Calculator</p>
        </div>

        <!-- 계산기 본체 -->
        <div class="bg-slate-700 rounded-2xl shadow-2xl p-6 space-y-4">
            <!-- 디스플레이 -->
            <div class="bg-slate-800 rounded-xl p-4 space-y-2 border border-slate-600">
                <div id="formula" class="text-right text-slate-400 text-lg h-6 overflow-hidden">0</div>
                <div id="display" class="text-right text-white text-4xl font-bold break-words overflow-hidden">0</div>
            </div>

            <!-- 버튼 그리드 -->
            <div class="grid grid-cols-4 gap-3">
                <!-- 첫 번째 행 -->
                <button class="function-btn col-span-1 bg-slate-600 hover:bg-slate-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">C</button>
                <button class="function-btn col-span-1 bg-slate-600 hover:bg-slate-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">±</button>
                <button class="function-btn col-span-1 bg-slate-600 hover:bg-slate-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">%</button>
                <button class="operator-btn col-span-1 bg-amber-600 hover:bg-amber-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">÷</button>

                <!-- 두 번째 행 -->
                <button class="number-btn col-span-1 bg-slate-600 hover:bg-slate-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">7</button>
                <button class="number-btn col-span-1 bg-slate-600 hover:bg-slate-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">8</button>
                <button class="number-btn col-span-1 bg-slate-600 hover:bg-slate-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">9</button>
                <button class="operator-btn col-span-1 bg-amber-600 hover:bg-amber-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">×</button>

                <!-- 세 번째 행 -->
                <button class="number-btn col-span-1 bg-slate-600 hover:bg-slate-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">4</button>
                <button class="number-btn col-span-1 bg-slate-600 hover:bg-slate-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">5</button>
                <button class="number-btn col-span-1 bg-slate-600 hover:bg-slate-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">6</button>
                <button class="operator-btn col-span-1 bg-amber-600 hover:bg-amber-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">−</button>

                <!-- 네 번째 행 -->
                <button class="number-btn col-span-1 bg-slate-600 hover:bg-slate-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">1</button>
                <button class="number-btn col-span-1 bg-slate-600 hover:bg-slate-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">2</button>
                <button class="number-btn col-span-1 bg-slate-600 hover:bg-slate-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">3</button>
                <button class="operator-btn col-span-1 bg-amber-600 hover:bg-amber-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">+</button>

                <!-- 다섯 번째 행 -->
                <button class="number-btn col-span-2 bg-slate-600 hover:bg-slate-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">0</button>
                <button class="decimal-btn col-span-1 bg-slate-600 hover:bg-slate-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">.</button>
                <button class="equals-btn col-span-1 bg-amber-600 hover:bg-amber-500 text-white font-semibold py-4 rounded-lg transition active:scale-95">=</button>
            </div>
        </div>

        <!-- 하단 텍스트 -->
        <div class="text-center mt-6 text-slate-500 text-sm">
            <p>키보드 입력도 지원합니다</p>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const formula = document.getElementById('formula');

        let currentValue = '0';
        let previousValue = '';
        let operator = null;
        let shouldResetDisplay = false;

        const numberBtns = document.querySelectorAll('.number-btn');
        const operatorBtns = document.querySelectorAll('.operator-btn');
        const decimalBtn = document.querySelector('.decimal-btn');
        const equalsBtn = document.querySelector('.equals-btn');
        const functionBtns = document.querySelectorAll('.function-btn');

        // 숫자 버튼
        numberBtns.forEach(btn => {
            btn.addEventListener('click', () => appendNumber(btn.textContent));
        });

        // 연산자 버튼
        operatorBtns.forEach(btn => {
            btn.addEventListener('click', () => setOperator(btn.textContent));
        });

        // 소수점 버튼
        decimalBtn.addEventListener('click', () => appendDecimal());

        // 계산 버튼
        equalsBtn.addEventListener('click', () => calculate());

        // 기능 버튼 (C, ±, %)
        functionBtns.forEach(btn => {
            btn.addEventListener('click', () => handleFunction(btn.textContent));
        });

        // 키보드 입력
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendDecimal();
            if (e.key === '+') setOperator('+');
            if (e.key === '-') setOperator('−');
            if (e.key === '*') setOperator('×');
            if (e.key === '/') { e.preventDefault(); setOperator('÷'); }
            if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); calculate(); }
            if (e.key === 'Backspace') backspace();
            if (e.key === 'Escape') handleFunction('C');
        });

        function appendNumber(num) {
            if (shouldResetDisplay) {
                currentValue = num;
                shouldResetDisplay = false;
            } else {
                currentValue = currentValue === '0' ? num : currentValue + num;
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetDisplay) {
                currentValue = '0.';
                shouldResetDisplay = false;
            } else if (!currentValue.includes('.')) {
                currentValue += '.';
            }
            updateDisplay();
        }

        function setOperator(op) {
            if (operator !== null && !shouldResetDisplay) {
                calculate();
            }
            previousValue = currentValue;
            operator = op;
            shouldResetDisplay = true;
            updateFormula();
        }

        function calculate() {
            if (operator === null || shouldResetDisplay) return;

            const prev = parseFloat(previousValue);
            const current = parseFloat(currentValue);

            let result;
            switch (operator) {
                case '+':
                    result = prev + current;
                    break;
                case '−':
                    result = prev - current;
                    break;
                case '×':
                    result = prev * current;
                    break;
                case '÷':
                    if (current === 0) {
                        currentValue = '0으로 나눌 수 없습니다';
                        updateDisplay();
                        operator = null;
                        shouldResetDisplay = true;
                        return;
                    }
                    result = prev / current;
                    break;
                default:
                    return;
            }

            currentValue = result.toString();
            operator = null;
            shouldResetDisplay = true;
            formula.textContent = '';
            updateDisplay();
        }

        function handleFunction(func) {
            switch (func) {
                case 'C':
                    currentValue = '0';
                    previousValue = '';
                    operator = null;
                    shouldResetDisplay = false;
                    formula.textContent = '';
                    break;
                case '±':
                    currentValue = (parseFloat(currentValue) * -1).toString();
                    break;
                case '%':
                    currentValue = (parseFloat(currentValue) / 100).toString();
                    break;
            }
            updateDisplay();
        }

        function backspace() {
            if (shouldResetDisplay) return;
            if (currentValue.length === 1) {
                currentValue = '0';
            } else {
                currentValue = currentValue.slice(0, -1);
            }
            updateDisplay();
        }

        function updateDisplay() {
            const displayNum = currentValue;
            if (displayNum.length > 15) {
                display.textContent = parseFloat(displayNum).toExponential(6);
            } else {
                display.textContent = displayNum;
            }
        }

        function updateFormula() {
            if (operator) {
                formula.textContent = previousValue + ' ' + operator;
            }
        }

        updateDisplay();
    </script>
</body>
</html>
